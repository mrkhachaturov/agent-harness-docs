name: Update agent harness docs

on:
  schedule:
    # Run every 3 hours (at 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: scripts/package-lock.json

    - name: Install Node dependencies (for MDX → MD conversion)
      working-directory: scripts
      run: npm ci

    - name: Verify skill renders are in sync with templates
      run: python scripts/render_skills.py --check

    - name: Fetch Claude Code documentation
      id: fetch-claude
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        python scripts/fetch_claude_docs.py || echo "claude_failed=true" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Fetch Codex documentation
      id: fetch-codex
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        python scripts/fetch_codex_docs.py || echo "codex_failed=true" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Fetch OpenCode documentation
      id: fetch-opencode
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        python scripts/fetch_opencode_docs.py || echo "opencode_failed=true" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Check for changes
      id: verify-changed-files
      run: |
        git diff --exit-code -- docs/ || echo "changed=true" >> $GITHUB_OUTPUT

    - name: Generate commit message
      if: steps.verify-changed-files.outputs.changed == 'true'
      id: commit-msg
      run: |
        git add -A docs/

        # Per-docset change summaries
        claude_changes=$(git diff --name-status --cached -- docs/claude-code/ | wc -l | tr -d ' ')
        codex_changes=$(git diff --name-status --cached -- docs/codex/        | wc -l | tr -d ' ')
        opencode_changes=$(git diff --name-status --cached -- docs/opencode/  | wc -l | tr -d ' ')

        COMMIT_MSG="Update agent harness docs - $(date +'%Y-%m-%d')"
        if [ "$claude_changes" != "0" ]; then
          COMMIT_MSG="$COMMIT_MSG | Claude Code: $claude_changes files changed"
        fi
        if [ "$codex_changes" != "0" ]; then
          COMMIT_MSG="$COMMIT_MSG | Codex: $codex_changes files changed"
        fi
        if [ "$opencode_changes" != "0" ]; then
          COMMIT_MSG="$COMMIT_MSG | OpenCode: $opencode_changes files changed"
        fi

        echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT

    - name: Commit and push if changed
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git commit -m "${{ steps.commit-msg.outputs.message }}"
        git push

    - name: Create issue on failure
      if: steps.fetch-claude.outputs.claude_failed == 'true' || steps.fetch-codex.outputs.codex_failed == 'true' || steps.fetch-opencode.outputs.opencode_failed == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const date = new Date().toISOString().split('T')[0];
          const claudeFailed   = '${{ steps.fetch-claude.outputs.claude_failed     }}' === 'true';
          const codexFailed    = '${{ steps.fetch-codex.outputs.codex_failed       }}' === 'true';
          const opencodeFailed = '${{ steps.fetch-opencode.outputs.opencode_failed }}' === 'true';
          const which = [
            claudeFailed   ? 'Claude Code' : null,
            codexFailed    ? 'Codex'       : null,
            opencodeFailed ? 'OpenCode'    : null,
          ].filter(Boolean).join(' + ');
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Documentation update failed (${which}) - ${date}`,
            body: `The automated documentation update failed for ${which} on ${date}.\n\nSee the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
            labels: ['bug', 'automation']
          })
